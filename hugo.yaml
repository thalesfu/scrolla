baseURL: "https://thalesfu.com/"
locale: "zh-cn"
defaultContentLanguage: zh-cn
hasCJKLanguage: true
title: "简帛与羊皮纸"
theme: PaperMod
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

mainSections: ["posts"]

taxonomies:
  tag: tags
  category: categories

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "简帛与羊皮纸"
  description: "一幅画，一本书，一段人生"
  keywords: [Blog, 读书, 技术, 随笔]
  author: 泰勒斯
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"

  homeInfoParams:
    Title: "简帛与羊皮纸"

  hero:
    description: "字句如云烟散落，思绪于此凝成册页。<br>以阅读丈量世界的深度，<br>以文字留住时光的轮廓。<br>无论行旅或静读，皆有痕迹可寻。"
    ctaText: "最新文章"
    ctaLink: "/posts/"

  quotes:
    - text: "知识是灵魂的眼睛。"
      author: "西塞罗"
    - text: "没有书籍的屋子，就像没有灵魂的躯体。"
      author: "西塞罗"
    - text: "读书使人充实，思考使人深邃，交谈使人清醒。"
      author: "培根"
    - text: "绘画是沉默的诗歌，诗歌是有声的绘画。"
      author: "西蒙尼德斯"
    - text: "理想的书籍是智慧的钥匙。"
      author: "托尔斯泰"
    - text: "生命太短暂，不能浪费在读糟糕的书上。"
      author: "歌德"
    - text: "读一本好书，就是和许多高尚的人谈话。"
      author: "歌德"
    - text: "时间是最好的作者，它总是找到最完美的结局。"
      author: "卓别林"
    - text: "一本书像一艘船，带领我们从狭隘的地方，驶向生活无限广阔的海洋。"
      author: "海伦·凯勒"
    - text: "人的影响短暂而微弱，书的影响则广泛而深远。"
      author: "普希金"
    - text: "书籍是屹立在时间的汪洋大海中的灯塔。"
      author: "惠普尔"
    - text: "书籍是朋友，虽然没有热情，但是非常忠实。"
      author: "雨果"
    - text: "我梦见绘画，然后我绘制我的梦。"
      author: "梵高"
    - text: "颜色是我整整一天的执念，是我的喜悦，也是我的痛苦。"
      author: "莫奈"
    - text: "我寻找的不是已知的事物，而是我还不知道的事物。"
      author: "毕加索"
    - text: "在艺术中，最重要的不是技术，而是情感。"
      author: "雷诺阿"
    - text: "当我们读一本书的时候，我们是在另一个人的帮助下认识自己。"
      author: "普鲁斯特"
    - text: "腹有诗书气自华。"
      author: "苏轼"
    - text: "博观而约取，厚积而薄发。"
      author: "苏轼"
    - text: "人生到处知何似，应似飞鸿踏雪泥。"
      author: "苏轼"
    - text: "问渠那得清如许，为有源头活水来。"
      author: "朱熹"
    - text: "逝者如斯夫，不舍昼夜。"
      author: "孔子"
    - text: "学而不思则罔，思而不学则殆。"
      author: "孔子"
    - text: "书卷多情似故人，晨昏忧乐每相亲。"
      author: "于谦"
    - text: "此中有真意，欲辨已忘言。"
      author: "陶渊明"
    - text: "文章千古事，得失寸心知。"
      author: "杜甫"
    - text: "读书破万卷，下笔如有神。"
      author: "杜甫"
    - text: "纸上得来终觉浅，绝知此事要躬行。"
      author: "陆游"
    - text: "外师造化，中得心源。"
      author: "张璪"
    - text: "吾生也有涯，而知也无涯。"
      author: "庄子"
    - text: "业精于勤，荒于嬉；行成于思，毁于随。"
      author: "韩愈"

  aboutSection:
    avatar: "/images/profile_titian.png"
    description: "偏爱有时间感的事物：<br>书、画、历史、城市与日常。<br>在这些缓慢的痕迹里，<br>更清醒地理解自己所在的世界。"
    linkText: "了解更多"

  socialIcons:
    - name: email
      url: "mailto:scrolla@thalesfu.com"
    - name: github
      url: "https://github.com/thalesfu"
    - name: wechat
      url: "weixin://dl/chat?thales_fu"
    - name: rss
      url: "/index.xml"

  editPost:
    URL: "https://github.com/thalesfu/scrolla/edit/main/content"
    Text: "Edit"
    appendFilePath: true

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
