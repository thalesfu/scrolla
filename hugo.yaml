baseURL: "https://thalesfu.com/"
locale: "zh-cn"
title: "简帛与羊皮纸"
theme: PaperMod
paginate: 10

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

mainSections: ["posts"]

taxonomies:
  tag: tags
  category: categories

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "简帛与羊皮纸"
  description: "一幅画，一本书，一段人生"
  keywords: [Blog, 读书, 技术, 随笔]
  author: ThalesFu
  DateFormat: "2006-01-02"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: true
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    disableHLJS: true
    favicon: "/favicon.ico"

  homeInfoParams:
    Title: "简帛与羊皮纸"

  hero:
    description: "这是一隅安静的书写之地。<br>在这里，记录学习过程，分享知识与感悟，<br>留下技术探索与实践的足迹。愿每一次阅读，<br>都能带来新的启发。"
    ctaText: "最新文章"
    ctaLink: "/posts/"

  quote:
    text: "知识是灵魂的眼睛。"
    author: "西塞罗"

  aboutSection:
    description: "热爱阅读、写作与思考的探索者。<br>相信文字与记录的力量，<br>也相信技术能让思法照进现实。"
    linkText: "了解更多"

  socialIcons:
    - name: email
      url: "mailto:thalesfu@gmail.com"
    - name: github
      url: "https://github.com/thalesfu"
    - name: rss
      url: "/index.xml"

  editPost:
    URL: "https://github.com/thalesfu/scrolla/edit/main/content"
    Text: "Edit"
    appendFilePath: true

menu:
  main:
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 10
    - identifier: tags
      name: Tags
      url: /tags/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
